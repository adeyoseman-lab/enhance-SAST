name: SAST - Snyk Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Snyk CLI
        run: |
          npm install -g snyk
          snyk --version

      - name: Authenticate
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth $SNYK_TOKEN

      - name: Run Snyk Code Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test \
            --sarif-file-output=snyk.sarif || true

          echo "========== Current Directory =========="
          pwd

          echo "========== Files =========="
          ls -lah

      - name: Verify SARIF
        run: |
          if [ ! -f snyk.sarif ]; then
            echo "ERROR: snyk.sarif was not generated."
            exit 1
          fi

      - name: Enhance SARIF
        run: |
          python scripts/enhance_snyk.py

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-enhanced.sarif
