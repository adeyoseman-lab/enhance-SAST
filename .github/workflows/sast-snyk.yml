name: SAST - Snyk Enhanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Snyk
        run: |
          npm install -g snyk
          snyk --version

      - name: Authenticate
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: Run Snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test \
            --json-file-output=snyk.json || true

      - name: Verify JSON
        run: |
          ls -lah
          test -f snyk.json

      - name: Convert JSON -> SARIF
        run: |
          python scripts/snyk_json_to_sarif.py

      - name: Enhance SARIF
        run: |
          python scripts/enhance_snyk.py

      - name: Upload
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-enhanced.sarif
