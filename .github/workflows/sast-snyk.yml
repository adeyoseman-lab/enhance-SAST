name: SAST - Snyk Free

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  snyk:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Snyk
        run: |
          npm install -g snyk
          snyk --version

      - name: Authenticate
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk auth $SNYK_TOKEN

      - name: Run Snyk Code
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk code test --json > snyk-code.json || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-json
          path: snyk-code.json
