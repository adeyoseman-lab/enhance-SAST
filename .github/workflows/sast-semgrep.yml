name: Semgrep Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:

  semgrep:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt

          pip install semgrep

      - name: Scan

        run: |

          semgrep scan \
            --config=auto \
            --config=p/security-audit \
            --sarif \
            --output semgrep.sarif

      - name: Enhance

        run: |

          python scripts/enhance_sarif.py

      - name: Upload

        uses: github/codeql-action/upload-sarif@v3

        with:

          sarif_file: semgrep-enhanced.sarif